<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw // Minimal Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #11182b;
      --panel-2: #162038;
      --line: rgba(137, 180, 250, 0.18);
      --text: #e5eefc;
      --muted: #92a1c2;
      --accent: #7dd3fc;
      --warn: #f6ad55;
      --danger: #fb7185;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #090d18 0%, #0b1020 100%);
      color: var(--text);
    }
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }
    .sidebar, .main {
      padding: 20px;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(9, 13, 24, 0.6);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.24);
    }
    .stack { display: flex; flex-direction: column; gap: 16px; }
    .title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
    }
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
    }
    #message-scroller {
      overflow: auto;
      min-height: 0;
      padding: 8px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(17, 24, 43, 0.7);
    }
    #message-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 88px;
    }
    #prompt-form {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
    }
    #prompt-input {
      width: 100%;
      border: 1px solid var(--line);
      background: #0a1120;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      outline: none;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      cursor: pointer;
    }
    #send-button { background: rgba(125, 211, 252, 0.12); }
    #scroll-hud-badge { position: fixed; right: 28px; bottom: 112px; }
    .typing-cursor {
      display: inline-block;
      width: 8px;
      height: 1.1em;
      margin-left: 4px;
      vertical-align: bottom;
      background: var(--accent);
      animation: blink 0.9s step-end infinite;
    }
    .typing-cursor.is-idle { opacity: 0.45; }
    .typing-cursor.is-hidden { display: none; }
    .typing-cursor.is-orphaned { background: var(--warn); animation-duration: 1.4s; }
    .telemetry-good { color: var(--accent); }
    .telemetry-warn { color: var(--warn); }
    .telemetry-critical { color: var(--danger); }
    .diagnostics-panel.battle-damaged { border-color: rgba(251, 113, 133, 0.45); }
    .code-block-panel {
      background: #0a1120;
      border: 1px solid var(--line);
    }
    .is-hidden { opacity: 0; pointer-events: none; }
    .is-visible { opacity: 1; }
    .wake-up-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at center, rgba(125, 211, 252, 0.16), transparent 60%);
      transition: opacity 0.25s ease;
    }
    .wake-up-flash.is-active { opacity: 1; }
    @keyframes blink { 50% { opacity: 0.2; } }
  </style>
</head>
<body>
  <div id="wake-up-flash" class="wake-up-flash"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="stack">
        <section class="panel">
          <div class="title">Minimal Hub</div>
          <div class="row">
            <strong>OpenClaw Runtime</strong>
            <span id="sidebar-link-chip" class="chip">离线</span>
          </div>
          <p style="margin: 12px 0 0; color: var(--muted); line-height: 1.6;">
            这是一个最小壳层，用来证明 Runtime 不依赖 J.A.R.V.I.S. HUD 的布局。
          </p>
        </section>
        <section class="panel">
          <div class="title">遥测</div>
          <div class="stack">
            <div class="row"><span>链路</span><span id="link-chip" class="chip">连接中</span></div>
            <div class="row"><span>语音</span><span id="voice-chip" class="chip">待命</span></div>
            <div class="row"><span>延迟</span><span id="latency-value" class="chip">0ms</span></div>
            <div class="row"><span>时钟</span><span id="clock-label" class="chip">--:--:--</span></div>
            <div class="row"><span>网关</span><span id="gateway-value" class="chip">127.0.0.1</span></div>
          </div>
        </section>
        <section class="panel">
          <div class="row" style="margin-bottom: 10px;">
            <span class="title" style="margin: 0;">智能体</span>
            <span id="sidebar-agents-status" class="chip">加载中</span>
          </div>
          <div id="sidebar-agents-list" class="stack"></div>
        </section>
      </div>
    </aside>

    <main class="main">
      <header class="panel">
        <div class="row">
          <div>
            <div class="title">对话界面</div>
            <strong>Minimal Shell // Shared Runtime</strong>
          </div>
          <div id="console-status" class="chip">待命</div>
        </div>
      </header>

      <section id="message-scroller">
        <div id="message-list"></div>
        <div id="bottom-sentinel"></div>
      </section>

      <form id="prompt-form">
        <input id="prompt-input" placeholder="输入消息、/诊断 或 /测试续写..." />
        <button id="mic-button" type="button">麦克风</button>
        <button id="send-button" type="submit">发送</button>
      </form>
    </main>
  </div>

  <button id="scroll-hud-badge" class="is-hidden">回到底部</button>

  <script type="module" src="./copy.zh-CN.js"></script>
  <script src="./hub.config.js"></script>
  <script type="module" src="../../packages/runtime/openclaw-hub-runtime.js"></script>
</body>
</html>
